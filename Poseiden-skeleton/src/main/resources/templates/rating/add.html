<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
>
<head>
    <meta charset="utf-8"/>
    <title>Home</title>
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" rel="stylesheet">
    <script crossorigin="anonymous"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
<div class="container flex-column d-flex justify-content-center align-items-center vh-100">

    <div class="row w-50">
        <h2>Add New Rating</h2>
    </div>

    <div class="row w-50">
        <form action="#" class="form-horizontal" method="post" style="width: 100%" th:action="@{/rating/validate}"
              th:object="${rating}">
            <div class="form-group">
                <label class="col-sm-4 control-label" for="moodysRating">MoodysRating</label>
                <div class="col-sm-10">
                    <input class="col-12 form-control px-4 my-2" id="moodysRating" placeholder="MoodysRating" th:field="*{moodysRating}"
                           type="text">
                    <p class="text-danger" th:errors="*{moodysRating}" th:if="${#fields.hasErrors('moodysRating')}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-4 control-label" for="sandPRating">SandPRating</label>
                <div class="col-sm-10">
                    <input class="col-12 form-control px-4 my-2" id="sandPRating" placeholder="SandPRating" th:field="*{sandPRating}"
                           type="text">
                    <p class="text-danger" th:errors="*{sandPRating}" th:if="${#fields.hasErrors('sandPRating')}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-4 control-label" for="fitchRating">FitchRating</label>
                <div class="col-sm-10">
                    <input class="col-12 form-control px-4 my-2" id="fitchRating" placeholder="FitchRating" th:field="*{fitchRating}"
                           type="text">
                    <p class="text-danger" th:errors="*{fitchRating}" th:if="${#fields.hasErrors('fitchRating')}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-4 control-label" for="orderNumber">Order</label>
                <div class="col-sm-10">
                    <input class="col-12 form-control px-4 my-2" id="orderNumber" placeholder="orderNumber" th:field="*{orderNumber}"
                           type="number">
                    <p class="text-danger" th:errors="*{orderNumber}" th:if="${#fields.hasErrors('orderNumber')}"></p>
                </div>
            </div>


            <div class="form-group mt-5">
                <div class="col-sm-12">
                    <a class="btn btn-danger btn-sm" th:href="@{/rating/list}">Cancel</a>
                    <input class="btn btn-primary btn-sm" type="submit" value="Add Rating">
                </div>
            </div>
        </form>
    </div>

</div>
</body>
</html>
