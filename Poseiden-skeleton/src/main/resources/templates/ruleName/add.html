<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Home</title>
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" rel="stylesheet">
    <script crossorigin="anonymous"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container flex-column d-flex justify-content-center align-items-center vh-100">

    <div class="row w-50">
        <h2>Add New Rule</h2>
    </div>

    <div class="row w-50">
        <form action="#" class="form-horizontal" method="post" style="width: 100%" th:action="@{/ruleName/validate}"
              th:object="${ruleName}">
            <div class="form-group">
                <label class="col-sm-4 control-label" for="name">Name</label>
                <div class="col-sm-10">
                    <input class="col-12 form-control px-4 my-2" id="name" placeholder="Name" th:field="*{name}"
                           type="text">
                    <p class="text-danger" th:errors="*{name}" th:if="${#fields.hasErrors('name')}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-4 control-label" for="description">Description</label>
                <div class="col-sm-10">
                    <input class="col-12 form-control px-4 my-2" id="description" placeholder="Description"
                           th:field="*{description}"
                           type="text">
                    <p class="text-danger" th:errors="*{description}" th:if="${#fields.hasErrors('description')}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-4 control-label" for="json">Json</label>
                <div class="col-sm-10">
                    <input class="col-12 form-control px-4 my-2" id="json" placeholder="Json" th:field="*{json}"
                           type="text">
                    <p class="text-danger" th:errors="*{json}" th:if="${#fields.hasErrors('json')}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-4 control-label" for="template">Template</label>
                <div class="col-sm-10">
                    <input class="col-12 form-control px-4 my-2" id="template" placeholder="Template"
                           th:field="*{template}" type="text">
                    <p class="text-danger" th:errors="*{template}" th:if="${#fields.hasErrors('template')}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-4 control-label" for="sql">SQL</label>
                <div class="col-sm-10">
                    <input class="col-12 form-control px-4 my-2" id="sql" placeholder="SQL" th:field="*{sqlStr}"
                           type="text">
                    <p class="text-danger" th:errors="*{sqlStr}" th:if="${#fields.hasErrors('sqlStr')}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-4 control-label" for="sqlPart">SQL Part</label>
                <div class="col-sm-10">
                    <input class="col-12 form-control px-4 my-2" id="sqlPart" placeholder="SQL Part"
                           th:field="*{sqlPart}" type="text">
                    <p class="text-danger" th:errors="*{sqlPart}" th:if="${#fields.hasErrors('sqlPart')}"></p>
                </div>
            </div>


            <div class="form-group mt-5">
                <div class="col-sm-12">
                    <a class="btn btn-danger btn-sm" th:href="@{/ruleName/list}">Cancel</a>
                    <input class="btn btn-primary btn-sm" type="submit" value="Add Rule">
                </div>
            </div>
        </form>
    </div>
    <div th:replace="~{messages :: messages}"></div>

</div>
</body>
</html>
