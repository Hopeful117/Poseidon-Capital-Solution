<!DOCTYPE html>
<html xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>messages</title>
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" rel="stylesheet">
    <script crossorigin="anonymous"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="row  justify-content-between" th:fragment="header">
    <div class="col-6">
        <a th:href="@{/bidList/list}">Bid List</a>&nbsp;|&nbsp;
        <a th:href="@{/curvePoint/list}">Curve Points</a>&nbsp;|&nbsp;
        <a th:href="@{/rating/list}">Ratings</a>&nbsp;|&nbsp;
        <a th:href="@{/trade/list}">Trade</a>&nbsp;|&nbsp;
        <a th:href="@{/ruleName/list}">Rule</a>
    </div>
    <div class="col-6 d-flex flex-column align-items-end">
        <div> Logged in user: <span sec:authentication="name" style="font-weight:bold"></span></div>
        <form method="POST" th:action="@{/app/logout}">
            <input type="submit" value="Logout"/>
        </form>
    </div>
</div>

</body>
</html>
