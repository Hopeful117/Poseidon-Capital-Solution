<!DOCTYPE html>

<html lang="FR" xmlns:th="http://www.thymeleaf.org">
<head>
    <title> Login Page </title>

    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" rel="stylesheet">



    <script crossorigin="anonymous"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

<div class="container d-flex flex-column align-items-center">

<h3> Login with username and password </h3>

<form method="post" th:action="@{/app/login}" class="mt-5">

    <div class="row mb-3  d-flex ">
        <label class="col-sm-3 col-form-label" for="username">User:</label>
        <div class="col-sm-9">
            <input name="username" type="text" class="form-control" id="username" >
        </div>
    </div>

    <div class="row mb-3 d-flex">
        <label class="col-sm-3 col-form-label" for="password">Password:</label>
        <div class="col-sm-9">
            <input name="password" type="password" class="form-control " placeholder="Mot de passe" id="password">
        </div>
    </div>

    <button class="btn btn-primary" type="submit">Login</button>


</form>

    </div>


</body>
</html>
