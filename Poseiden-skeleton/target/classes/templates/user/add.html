<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Home</title>
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" rel="stylesheet">
    <script crossorigin="anonymous"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container flex-column d-flex justify-content-center align-items-center vh-100">

    <div class="row w-50">
        <h2>Add New User</h2>
    </div>

    <div class="row w-50">
        <form action="#" class="form-horizontal" method="post" style="width: 100%" th:action="@{/user/validate}"
              th:object="${user}">
            <div class="form-group">
                <label class="col-sm-4 control-label" for="fullname">Full Name</label>
                <div class="col-sm-10">
                    <input class="col-12 form-control px-4 my-2" id="fullname" placeholder="Full Name" th:field="*{fullname}" type="text">
                    <p class="text-danger" th:errors="*{fullname}" th:if="${#fields.hasErrors('fullname')}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-4 control-label" for="username">User Name</label>
                <div class="col-sm-10">
                    <input class="col-12 form-control px-4 my-2" id="username" placeholder="User Name" th:field="*{username}" type="text">
                    <p class="text-danger" th:errors="*{username}" th:if="${#fields.hasErrors('username')}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-4 control-label" for="password">Password</label>
                <div class="col-sm-10">
                    <input class="col-12 form-control px-4 my-2" id="password" placeholder="Password" th:field="*{password}" type="password">
                    <p class="text-danger" th:errors="*{password}" th:if="${#fields.hasErrors('password')}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-4 control-label" for="password">Role</label>
                <div class="col-sm-10">
                    <label class="checkbox-inline"><input th:field="*{role}" th:value="ADMIN" type="radio">Admin</label>
                    <label class="checkbox-inline"><input th:field="*{role}" th:value="USER" type="radio">User</label>
                    <p class="text-danger" th:errors="*{role}" th:if="${#fields.hasErrors('role')}"></p>
                </div>
            </div>


            <div class="form-group mt-5">
                <div class="col-sm-12">
                    <a class="btn btn-danger btn-sm" th:href="@{/user/list}">Cancel</a>
                    <input class="btn btn-primary btn-sm" type="submit" value="Add user">
                </div>
            </div>

        </form>
    </div>
    <div th:replace="~{messages :: messages}"></div>


</div>
</body>
</html>
