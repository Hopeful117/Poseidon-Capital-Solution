<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Home</title>
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" rel="stylesheet">
    <script crossorigin="anonymous"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container flex-column d-flex justify-content-center align-items-center vh-100">

    <div class="row w-50">
        <h2>Add New Trade</h2>
    </div>

    <div class="row w-50">
        <form action="#" class="form-horizontal" method="post" style="width: 100%" th:action="@{/trade/validate}"
              th:object="${trade}">
            <div class="form-group">
                <label class="col-sm-4 control-label" for="account">Account</label>
                <div class="col-sm-10">
                    <input class="col-12 form-control px-4 my-2" id="account" placeholder="Account" th:field="*{account}" type="text">
                    <p class="text-danger" th:errors="*{account}" th:if="${#fields.hasErrors('account')}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-4 control-label" for="type">Type</label>
                <div class="col-sm-10">
                    <input class="col-12 form-control px-4 my-2" id="type" placeholder="Type" th:field="*{type}" type="text">
                    <p class="text-danger" th:errors="*{type}" th:if="${#fields.hasErrors('type')}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-4 control-label" for="buyQuantity">Buy Quantity</label>
                <div class="col-sm-10">
                    <input class="col-12 form-control px-4 my-2" id="buyQuantity" placeholder="Buy Quantity" th:field="*{buyQuantity}"
                           type="number">
                    <p class="text-danger" th:errors="*{buyQuantity}" th:if="${#fields.hasErrors('buyQuantity')}"></p>
                </div>
            </div>


            <div class="form-group mt-5">
                <div class="col-sm-12">
                    <a class="btn btn-danger btn-sm" th:href="@{/trade/list}">Cancel</a>
                    <input class="btn btn-primary btn-sm" type="submit" value="Add Trade">
                </div>
            </div>
        </form>
    </div>
    <div th:replace="~{messages :: messages}"></div>

</div>
</body>
</html>
